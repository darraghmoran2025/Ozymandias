<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ozymandias</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { overflow: hidden; }
    #pillar-canvas {
      position: fixed;
      inset: 0;
      z-index: 1;
    }
    .back-link {
      position: fixed;
      top: 1.5rem;
      left: 1.8rem;
      z-index: 10;
      color: rgba(160, 175, 200, 0.45);
      text-decoration: none;
      font-family: Georgia, serif;
      font-size: 0.82rem;
      letter-spacing: 0.12em;
      transition: color 0.3s ease;
    }
    .back-link:hover { color: rgba(200, 215, 240, 0.85); }
  </style>
</head>
<body>
  <div class="nebula">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>
  <div class="stars" id="stars"></div>
  <canvas id="pillar-canvas"></canvas>
  <div class="moon" id="moon-return"></div>
  <a href="index.html" class="back-link">← return</a>
  <script type="module" src="pillar.js"></script>
</body>
</html>
